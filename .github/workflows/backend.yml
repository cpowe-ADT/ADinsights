name: Backend CI

on:
  pull_request:
    branches:
      - main
    paths:
      - 'backend/**'
      - '.github/workflows/backend.yml'

jobs:
  lint-and-test:
    name: Lint and test backend
    runs-on: ubuntu-latest
    env:
      DJANGO_SECRET_KEY: test-secret-key
      CELERY_BROKER_URL: redis://localhost:6379/0
      CELERY_RESULT_BACKEND: redis://localhost:6379/1
      SECRETS_PROVIDER: env
      KMS_PROVIDER: aws
      KMS_KEY_ID: local-ci-key
      AWS_REGION: us-east-1
      AIRBYTE_API_URL: http://localhost:8001
      AIRBYTE_API_TOKEN: ci-placeholder
      RUN_BACKEND_INTEGRATION_TESTS: "0"
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Run Ruff
        run: ruff check backend

      - name: Run pytest with coverage
        run: |
          mkdir -p backend/test-results backend/htmlcov
          pytest -m "not integration" backend \
            --junitxml=backend/test-results/junit.xml \
            --cov=backend \
            --cov-report=xml:backend/coverage.xml \
            --cov-report=html:backend/htmlcov

      - name: Run backend release smoke
        run: |
          python - <<'PY'
          from __future__ import annotations

          import io
          import os
          import sys
          from pathlib import Path

          repo_root = Path.cwd()
          sys.path.insert(0, str(repo_root / "backend"))
          os.environ.setdefault("DJANGO_SETTINGS_MODULE", "config.settings.test")

          import django
          django.setup()

          from core.metrics import observe_task_queue_start, observe_task_retry
          from django.core.management import call_command

          observe_task_queue_start(
              task_name="ci.backend_release_smoke",
              queue_name="sync",
              queue_wait_seconds=0.0,
          )
          observe_task_queue_start(
              task_name="ci.backend_release_smoke",
              queue_name="snapshot",
              queue_wait_seconds=0.0,
          )
          observe_task_queue_start(
              task_name="ci.backend_release_smoke",
              queue_name="summary",
              queue_wait_seconds=0.0,
          )
          observe_task_retry(
              task_name="ci.backend_release_smoke",
              reason="airbyte_client_error",
          )

          output = io.StringIO()
          call_command("backend_release_smoke", "--strict-observability", stdout=output)
          payload = output.getvalue()
          print(payload)
          (repo_root / "backend-release-smoke.json").write_text(payload, encoding="utf-8")
          PY

      - name: Generate backend CI summary
        run: |
          python scripts/ci/backend-summary.py \
            --junit backend/test-results/junit.xml \
            --coverage backend/coverage.xml \
            --release-smoke backend-release-smoke.json

      - name: Upload backend CI summary
        uses: actions/upload-artifact@v4
        with:
          name: backend-ci-summary.json
          path: backend-ci-summary.json

      - name: Upload backend release smoke
        uses: actions/upload-artifact@v4
        with:
          name: backend-release-smoke.json
          path: backend-release-smoke.json

      - name: Upload backend CI metrics
        uses: actions/upload-artifact@v4
        with:
          name: ci-metrics.csv
          path: ci-metrics.csv

      - name: Upload backend test results
        uses: actions/upload-artifact@v4
        with:
          name: backend-tests
          path: backend/test-results/junit.xml

      - name: Upload backend coverage reports
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: |
            backend/coverage.xml
            backend/htmlcov

      - name: Publish coverage summary
        run: |
          python scripts/ci/coverage-summary.py \
            --coverage backend=backend/coverage.xml \
            --junit backend=backend/test-results/junit.xml
