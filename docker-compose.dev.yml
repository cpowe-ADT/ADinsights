services:
  postgres:
    image: postgres:15
    restart: unless-stopped
    environment:
      POSTGRES_USER: adinsights_user
      POSTGRES_PASSWORD: adinsights_pass
      POSTGRES_DB: adinsights
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB']
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - '${POSTGRES_PORT:-5432}:5432'

  redis:
    image: redis:7
    restart: unless-stopped
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - '${REDIS_PORT:-6379}:6379'

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    env_file:
      - ./backend/.env.dev
    environment:
      FRONTEND_BASE_URL: ${FRONTEND_BASE_URL:-http://localhost:5173}
      META_OAUTH_REDIRECT_URI: ${META_OAUTH_REDIRECT_URI:-}
      DEV_BACKEND_URL: ${DEV_BACKEND_URL:-}
      DEV_FRONTEND_URL: ${DEV_FRONTEND_URL:-}
      DEV_ACTIVE_PROFILE: ${DEV_ACTIVE_PROFILE:-}
      REPORT_EXPORTER_DIR: /opt/adinsights/exporter
      REPORT_EXPORT_ARTIFACT_ROOT: /var/lib/adinsights/report-exports
      PROMETHEUS_MULTIPROC_DIR: /var/lib/adinsights/prometheus-multiprocess
    volumes:
      - ./backend:/app
      - ./scripts:/app/scripts:ro
      - ./dbt:/app/dbt
      - report_export_artifacts:/var/lib/adinsights/report-exports
      - prometheus_multiprocess:/var/lib/adinsights/prometheus-multiprocess
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - '${BACKEND_PORT:-8000}:8000'
    command: >
      bash -c "
        pip install --no-cache-dir -r requirements.txt 2>/dev/null || true &&
        python manage.py migrate --noinput &&
        python manage.py runserver 0.0.0.0:8000
      "

  celery_worker:
    build:
      context: .
      dockerfile: backend/Dockerfile
    env_file:
      - ./backend/.env.dev
    environment:
      FRONTEND_BASE_URL: ${FRONTEND_BASE_URL:-http://localhost:5173}
      META_OAUTH_REDIRECT_URI: ${META_OAUTH_REDIRECT_URI:-}
      DEV_BACKEND_URL: ${DEV_BACKEND_URL:-}
      DEV_FRONTEND_URL: ${DEV_FRONTEND_URL:-}
      DEV_ACTIVE_PROFILE: ${DEV_ACTIVE_PROFILE:-}
      PROMETHEUS_MULTIPROC_DIR: /var/lib/adinsights/prometheus-multiprocess
    volumes:
      - ./backend:/app
      - prometheus_multiprocess:/var/lib/adinsights/prometheus-multiprocess
    depends_on:
      backend:
        condition: service_started
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    command: >
      bash -lc "
        pip install --no-cache-dir -r requirements.txt 2>/dev/null || true &&
        celery -A core worker -l INFO -Q $${CELERY_WORKER_SYNC_QUEUES:-default,sync} --concurrency=$${CELERY_WORKER_SYNC_CONCURRENCY:-4} --prefetch-multiplier=$${CELERY_WORKER_SYNC_PREFETCH_MULTIPLIER:-1} \
        --max-tasks-per-child=$${CELERY_WORKER_SYNC_MAX_TASKS_PER_CHILD:-200}
      "
    restart: on-failure

  celery_worker_snapshot:
    build:
      context: .
      dockerfile: backend/Dockerfile
    env_file:
      - ./backend/.env.dev
    environment:
      FRONTEND_BASE_URL: ${FRONTEND_BASE_URL:-http://localhost:5173}
      META_OAUTH_REDIRECT_URI: ${META_OAUTH_REDIRECT_URI:-}
      DEV_BACKEND_URL: ${DEV_BACKEND_URL:-}
      DEV_FRONTEND_URL: ${DEV_FRONTEND_URL:-}
      DEV_ACTIVE_PROFILE: ${DEV_ACTIVE_PROFILE:-}
      PROMETHEUS_MULTIPROC_DIR: /var/lib/adinsights/prometheus-multiprocess
    volumes:
      - ./backend:/app
      - prometheus_multiprocess:/var/lib/adinsights/prometheus-multiprocess
    depends_on:
      backend:
        condition: service_started
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    command: >
      bash -lc "
        pip install --no-cache-dir -r requirements.txt 2>/dev/null || true &&
        celery -A core worker -l INFO -Q $${CELERY_WORKER_SNAPSHOT_QUEUES:-snapshot} --concurrency=$${CELERY_WORKER_SNAPSHOT_CONCURRENCY:-2} --prefetch-multiplier=$${CELERY_WORKER_SNAPSHOT_PREFETCH_MULTIPLIER:-1} \
        --max-tasks-per-child=$${CELERY_WORKER_SNAPSHOT_MAX_TASKS_PER_CHILD:-100}
      "
    restart: on-failure

  celery_worker_summary:
    build:
      context: .
      dockerfile: backend/Dockerfile
    env_file:
      - ./backend/.env.dev
    environment:
      FRONTEND_BASE_URL: ${FRONTEND_BASE_URL:-http://localhost:5173}
      META_OAUTH_REDIRECT_URI: ${META_OAUTH_REDIRECT_URI:-}
      DEV_BACKEND_URL: ${DEV_BACKEND_URL:-}
      DEV_FRONTEND_URL: ${DEV_FRONTEND_URL:-}
      DEV_ACTIVE_PROFILE: ${DEV_ACTIVE_PROFILE:-}
      REPORT_EXPORTER_DIR: /opt/adinsights/exporter
      REPORT_EXPORT_ARTIFACT_ROOT: /var/lib/adinsights/report-exports
      PROMETHEUS_MULTIPROC_DIR: /var/lib/adinsights/prometheus-multiprocess
    volumes:
      - ./backend:/app
      - report_export_artifacts:/var/lib/adinsights/report-exports
      - prometheus_multiprocess:/var/lib/adinsights/prometheus-multiprocess
    depends_on:
      backend:
        condition: service_started
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    command: >
      bash -lc "
        pip install --no-cache-dir -r requirements.txt 2>/dev/null || true &&
        celery -A core worker -l INFO -Q $${CELERY_WORKER_SUMMARY_QUEUES:-summary} --concurrency=$${CELERY_WORKER_SUMMARY_CONCURRENCY:-1} --prefetch-multiplier=$${CELERY_WORKER_SUMMARY_PREFETCH_MULTIPLIER:-1} \
        --max-tasks-per-child=$${CELERY_WORKER_SUMMARY_MAX_TASKS_PER_CHILD:-100}
      "
    restart: on-failure

  celery_beat:
    build:
      context: .
      dockerfile: backend/Dockerfile
    env_file:
      - ./backend/.env.dev
    environment:
      FRONTEND_BASE_URL: ${FRONTEND_BASE_URL:-http://localhost:5173}
      META_OAUTH_REDIRECT_URI: ${META_OAUTH_REDIRECT_URI:-}
      DEV_BACKEND_URL: ${DEV_BACKEND_URL:-}
      DEV_FRONTEND_URL: ${DEV_FRONTEND_URL:-}
      DEV_ACTIVE_PROFILE: ${DEV_ACTIVE_PROFILE:-}
    volumes:
      - ./backend:/app
    depends_on:
      backend:
        condition: service_started
      redis:
        condition: service_healthy
    command: >
      bash -lc "
        pip install --no-cache-dir -r requirements.txt 2>/dev/null || true &&
        rm -f /tmp/celerybeat.pid &&
        celery -A core beat -l INFO --schedule /tmp/celerybeat-schedule --pidfile /tmp/celerybeat.pid
      "
    restart: on-failure

  frontend:
    image: node:20-alpine
    working_dir: /usr/src/app
    env_file:
      - ./frontend/.env
    environment:
      VITE_DEV_HTTPS: ${VITE_DEV_HTTPS:-0}
      VITE_DEV_HTTPS_KEY: ${VITE_DEV_HTTPS_KEY:-}
      VITE_DEV_HTTPS_CERT: ${VITE_DEV_HTTPS_CERT:-}
    volumes:
      - ./frontend:/usr/src/app
      - frontend_node_modules:/usr/src/app/node_modules
    ports:
      - '${FRONTEND_PORT:-5173}:5173'
    depends_on:
      backend:
        condition: service_started
    command: >
      sh -c "
        if [ ! -d node_modules ] || [ -z \"$(ls -A node_modules 2>/dev/null)\" ]; then
          npm ci --silent || true;
        fi &&
        npm run dev -- --host 0.0.0.0
      "

volumes:
  pgdata:
  frontend_node_modules:
  report_export_artifacts:
  prometheus_multiprocess:
