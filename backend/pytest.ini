[pytest]
DJANGO_SETTINGS_MODULE = config.settings.test
django_find_project = true
pythonpath = ..
python_files = tests.py test_*.py *_tests.py
addopts = -q
markers =
    fast: default backend PR suite marker for non-integration tests
    integration: end-to-end vertical slice checks (opt-in via RUN_BACKEND_INTEGRATION_TESTS=1)
