<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>{{TITLE}}</title>
    <style>
      :root {
        color-scheme: light;
        font-family: 'Inter', 'Helvetica Neue', Arial, sans-serif;
      }
      body {
        margin: 0;
        background: #edf2f7;
        color: #17202a;
      }
      .report-shell {
        background: #ffffff;
        margin: 28px auto;
        max-width: 1040px;
        min-height: calc(100vh - 56px);
        padding: 30px;
      }
      header {
        align-items: flex-start;
        border-bottom: 2px solid #d9e2ec;
        display: flex;
        gap: 22px;
        justify-content: space-between;
        margin-bottom: 22px;
        padding-bottom: 18px;
      }
      h1 {
        color: #102a43;
        font-size: 30px;
        line-height: 1.12;
        margin: 0;
      }
      .eyebrow {
        color: #0b5a7a;
        font-size: 11px;
        font-weight: 700;
        letter-spacing: 0.08em;
        margin: 0 0 8px 0;
        text-transform: uppercase;
      }
      .subtitle,
      .meta {
        color: #52606d;
        font-size: 12px;
        margin-top: 6px;
      }
      .report-stamp {
        border: 1px solid #d9e2ec;
        border-radius: 8px;
        color: #334e68;
        min-width: 190px;
        padding: 10px 12px;
        text-align: right;
      }
      .report-stamp div {
        font-size: 11px;
        line-height: 1.45;
      }
      .metric-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(170px, 1fr));
        gap: 12px;
        margin-bottom: 20px;
      }
      .metric-card {
        background: #ffffff;
        border: 1px solid #d9e2ec;
        border-radius: 8px;
        padding: 14px;
        box-shadow: 0 1px 2px rgba(15, 23, 42, 0.08);
      }
      .metric-card h2 {
        color: #334e68;
        font-size: 12px;
        letter-spacing: 0.08em;
        margin: 0 0 8px 0;
        text-transform: uppercase;
      }
      .metric-card .value {
        font-size: 22px;
        font-weight: 700;
      }
      .metric-card .context,
      .muted {
        color: #627d98;
        font-size: 11px;
        margin-top: 4px;
      }
      .availability-notes {
        background: #fffaf0;
        border: 1px solid #f0b429;
        border-radius: 8px;
        margin-bottom: 18px;
        padding: 12px 14px;
      }
      .availability-notes h2 {
        color: #7c2d12;
        font-size: 13px;
        margin: 0 0 8px 0;
      }
      .availability-notes ul {
        margin: 0;
        padding-left: 18px;
      }
      .availability-notes li {
        color: #7c2d12;
        font-size: 12px;
        margin: 4px 0;
      }
      .saved-layout {
        display: grid;
        gap: 12px;
        width: 100%;
      }
      .saved-layout__cell {
        background: #ffffff;
        border: 1px solid #d9e2ec;
        border-radius: 8px;
        box-shadow: 0 1px 2px rgba(15, 23, 42, 0.08);
        display: flex;
        flex-direction: column;
        min-width: 0;
        overflow: hidden;
        padding: 14px;
      }
      .saved-layout__cell h2 {
        color: #334e68;
        font-size: 12px;
        letter-spacing: 0.04em;
        margin: 0 0 8px 0;
        text-transform: uppercase;
      }
      .saved-layout__value {
        color: #17202a;
        font-size: 24px;
        font-weight: 700;
        line-height: 1.15;
      }
      .saved-layout__context,
      .saved-layout__note {
        color: #52606d;
        font-size: 12px;
        line-height: 1.45;
        margin: 6px 0 0;
      }
      .saved-layout__table-wrap {
        overflow: hidden;
      }
      .saved-layout__table {
        border-radius: 6px;
        box-shadow: none;
        font-size: 11px;
      }
      .saved-layout__table th,
      .saved-layout__table td {
        font-size: 11px;
        padding: 7px 8px;
      }
      .saved-layout__bar-row {
        align-items: center;
        display: grid;
        gap: 8px;
        grid-template-columns: minmax(90px, 1.2fr) 2fr minmax(54px, auto);
        margin: 6px 0;
      }
      .saved-layout__bar-row span,
      .saved-layout__bar-row strong {
        color: #334e68;
        font-size: 11px;
      }
      .saved-layout__bar-track {
        background: #e4e7eb;
        border-radius: 999px;
        height: 8px;
        overflow: hidden;
      }
      .saved-layout__bar-track div {
        background: #0b5a7a;
        height: 100%;
      }
      .saved-layout svg {
        max-height: 150px;
        width: 100%;
      }
      table {
        width: 100%;
        border-collapse: collapse;
        background: #ffffff;
        border: 1px solid #d9e2ec;
        border-radius: 8px;
        box-shadow: 0 1px 2px rgba(15, 23, 42, 0.08);
        overflow: hidden;
      }
      thead {
        background: #0b5a7a;
        color: #f8fafc;
      }
      th,
      td {
        border-bottom: 1px solid #e4e7eb;
        font-size: 12px;
        padding: 9px 10px;
        text-align: left;
        vertical-align: top;
      }
      tbody tr:nth-child(even) {
        background: #f1f5f9;
      }
      td:nth-child(6) {
        color: #52606d;
      }
      .report-evidence {
        border-top: 1px solid #d9e2ec;
        color: #627d98;
        font-size: 10px;
        line-height: 1.45;
        margin-top: 24px;
        padding-top: 12px;
      }
    </style>
  </head>
  <body>
    <main class="report-shell">
      <header>
        <div>
          <p class="eyebrow">Monthly client report</p>
          <h1>{{TITLE}}</h1>
          <div class="subtitle">Social performance summary</div>
          <div class="meta">{{DATE_RANGE}}</div>
        </div>
        <aside class="report-stamp" aria-label="Report preparation details">
          <div>Prepared by ADinsights</div>
          <div>Stored aggregate data</div>
          <div>{{GENERATED_AT}}</div>
        </aside>
      </header>

      {{REPORT_BODY}}

      <footer class="report-evidence">Report evidence: {{SUBTITLE}}</footer>
    </main>
  </body>
</html>
